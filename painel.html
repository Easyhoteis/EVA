<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVA - Painel</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #667eea; --secondary: #764ba2;
            --success: #48bb78; --danger: #f56565;
            --warning: #ed8936; --info: #4299e1;
            --light: #f7fafc; --dark: #2d3748;
            --gray: #718096; --border: #e2e8f0;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--light); color: var(--dark); min-height: 100vh; }
        .login-screen { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(135deg, var(--primary), var(--secondary)); }
        .login-box { background: white; padding: 3rem; border-radius: 16px; max-width: 400px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .login-header { text-align: center; margin-bottom: 2rem; }
        .login-icon { font-size: 60px; }
        .login-title { background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 32px; }
        .login-subtitle { color: var(--gray); font-size: 11px; text-transform: uppercase; letter-spacing: 2px; }
        #erro-login { display: none; background: #fed7d7; color: #742a2a; padding: 0.75rem; border-radius: 8px; margin-bottom: 1rem; font-size: 13px; }
        .login-input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid var(--border); border-radius: 8px; }
        .login-button { width: 100%; padding: 12px; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; }
        .main { display: flex; height: 100vh; }
        .sidebar { width: 260px; background: white; box-shadow: 2px 0 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .logo-section { padding: 1.5rem; border-bottom: 1px solid var(--border); }
        .logo { display: flex; align-items: center; gap: 1rem; }
        .logo-icon { width: 45px; height: 45px; border-radius: 10px; background: linear-gradient(135deg, var(--primary), var(--secondary)); display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; }
        .logo h1 { font-size: 22px; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .logo p { font-size: 10px; color: var(--gray); text-transform: uppercase; letter-spacing: 1px; }
        .nav { flex: 1; padding: 1rem 0; overflow-y: auto; }
        .nav-item { padding: 0.85rem 1.5rem; cursor: pointer; border-left: 4px solid transparent; display: flex; align-items: center; gap: 1rem; color: var(--gray); font-weight: 500; font-size: 14px; transition: all 0.3s; }
        .nav-item:hover { background: var(--light); color: var(--primary); }
        .nav-item.ativo { border-left-color: var(--primary); background: rgba(102, 126, 234, 0.1); color: var(--primary); }
        .nav-item i { width: 20px; text-align: center; }
        .nav-item.hidden { display: none; }
        .badge { background: var(--danger); color: white; font-size: 11px; padding: 2px 8px; border-radius: 10px; margin-left: auto; }
    </style>
</head>
<body>
<div class="login-screen" id="tela-login">
    <div class="login-box">
        <div class="login-header">
            <div class="login-icon">🤖</div>
            <h2 class="login-title">EVA</h2>
            <p class="login-subtitle">Hotel AI</p>
        </div>
        <div id="erro-login"></div>
        <input type="email" class="login-input" id="login-email" placeholder="Email">
        <input type="password" class="login-input" id="login-senha" placeholder="Senha">
        <button class="login-button" id="btn-login">Entrar</button>
    </div>
</div>

<div class="main" id="app-content" style="display:none">
    <div style="padding:3rem;text-align:center">
        <h1>🎉 EVA funcionando!</h1>
        <p>Login realizado com sucesso!</p>
        <button onclick="localStorage.removeItem('eva-token'); location.reload()">Sair</button>
    </div>
</div>

<script>
const API = "/api";
let token = localStorage.getItem("eva-token");

document.addEventListener("DOMContentLoaded", () => {
    if (token) verificarToken();
    document.getElementById("btn-login").addEventListener("click", fazerLogin);
    document.getElementById("login-senha").addEventListener("keypress", (e) => {
        if (e.key === "Enter") fazerLogin();
    });
});

async function verificarToken() {
    try {
        const res = await fetch(`${API}/me`, { headers: { 'Authorization': `Bearer ${token}` } });
        const data = await res.json();
        if (data.sucesso) {
            mostrarApp();
        } else {
            localStorage.removeItem("eva-token");
            token = null;
        }
    } catch (e) { 
        localStorage.removeItem("eva-token"); 
        token = null;
    }
}

async function fazerLogin() {
    const email = document.getElementById("login-email").value;
    const senha = document.getElementById("login-senha").value;
    const erroEl = document.getElementById("erro-login");
    
    if (!email || !senha) {
        erroEl.textContent = "Preencha email e senha";
        erroEl.style.display = 'block';
        return;
    }
    
    try {
        const res = await fetch(`${API}/login`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ email, senha })
        });
        
        const data = await res.json();
        
        if (data.sucesso) {
            token = data.token;
            localStorage.setItem("eva-token", token);
            mostrarApp();
        } else {
            erroEl.textContent = data.erro || "Email ou senha incorretos";
            erroEl.style.display = 'block';
        }
    } catch (e) {
        erroEl.textContent = "Erro ao conectar. Tente novamente.";
        erroEl.style.display = 'block';
    }
}

function mostrarApp() {
    document.getElementById("tela-login").style.display = 'none';
    document.getElementById("app-content").style.display = 'flex';
}
</script>
</body>
</html>
